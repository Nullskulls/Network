{% extends "base.html" %}
{% block title %}{{ dm_display_name }}{% endblock %}
{% block main %}
<header class="chat-header">
    <div class="chat-header-info">
        <span class="chat-title">{{ dm_display_name }}</span>
        <span class="chat-status">online</span>
    </div>
</header>
<div class="chat-body chat-body-with-compose">
    <div class="messages-container" id="dm-messages-container">
        <div class="messages" id="dm-messages">
            {% for msg in messages %}
            <div class="message-wrapper {% if msg.from == 'You' %}you{% else %}orpheus{% endif %}">
                <div class="message visible">
                    <div class="message-body">
                        <span class="message-sender">{{ msg.from }}</span>
                        <p class="message-text">{{ msg.message }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="dm-compose">
        <form id="dm-form" class="dm-compose-form">
            <input type="text" id="dm-input" class="dm-input" placeholder="Message {{ dm_display_name }}..." autocomplete="off">
            <button type="submit" class="dm-send-btn">Send</button>
        </form>
    </div>
</div>
<script nonce="{{ csp_nonce }}">
window.DM_USER_ID = {{ dm_user_id | tojson }};
window.CURRENT_USER = {{ (session.get('nickname') or session.get('name') or 'You') | tojson }};
</script>
<script src="{{ url_for('static', filename='js/dm.js') }}"></script>
{% endblock %}
